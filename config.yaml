# ─────────────────────────────────────────────────────────────────
# Job Bot Configuration — John Christadore
# ─────────────────────────────────────────────────────────────────

filters:
  # Minimum annual base salary (USD).
  # Roles with NO stated salary still pass — only filtered if salary is explicit AND below this.
  min_salary: 165000

  # Must mention at least one comp signal (bonus/equity/RSU/stock/401k)
  require_bonus_or_equity: true

  # Only fully remote roles
  fully_remote_only: true

  # Only full-time employee roles (rejects contract/freelance/part-time)
  full_time_only: true

  # Target industry verticals — used for scoring boost (not hard filter)
  # Roles at companies in these spaces get a +10 score bonus
  preferred_industries:
    - artificial intelligence
    - machine learning
    - AI
    - sports technology
    - sports analytics
    - fitness technology
    - health and fitness
    - wearables
    - athletic performance
    - SaaS
    - B2B software
    - developer tools
    - cloud platform
    - data platform

scoring:
  # These are matched against job TITLES (case-insensitive substring match)
  # Each hit adds +5 points to the job's score
  title_signals:
    # Product Management
    - product manager
    - senior product manager
    - principal product manager
    - director of product
    - head of product
    - vp of product
    - vp product
    - chief product officer
    - group product manager
    - product lead
    - product owner
    # Program Management
    - program manager
    - senior program manager
    - global program manager
    - technical program manager
    - director of program
    - head of programs
    - vp of program
    - enterprise program manager
    - delivery manager
    - portfolio manager
    - program director
    # Project Management
    - project manager
    - senior project manager
    - director of project
    - head of project management
    - project lead
    - it project manager
    - technical project manager

  # Jobs whose titles contain ANY of these strings are penalized -20 points
  title_blocklist:
    - devops engineer
    - data analyst
    - data engineer
    - data scientist
    - software engineer
    - software developer
    - frontend engineer
    - backend engineer
    - full stack
    - fullstack
    - machine learning engineer
    - ml engineer
    - security engineer
    - network engineer
    - cloud engineer
    - site reliability engineer
    - sre engineer
    - qa engineer
    - quality assurance engineer
    - business analyst
    - systems engineer
    - platform engineer
    - solutions engineer
    - marketing manager
    - sales manager
    - account executive
    - account manager
    - recruiter
    - hr manager

  # Company/description keywords that signal a preferred industry vertical
  # Each hit adds +3 points
