# ─────────────────────────────────────────────────────────────────
# Job Bot Configuration — John Christadore
# ─────────────────────────────────────────────────────────────────

filters:
  # Minimum annual base salary (USD).
  # Roles with NO stated salary still pass — only filtered if salary is explicit AND below this.
  min_salary: 165000

  # Must mention at least one comp signal (bonus/equity/RSU/stock/401k)
  require_bonus_or_equity: true

  # Only fully remote roles
  fully_remote_only: true

  # Only full-time employee roles (rejects contract/freelance/part-time)
  full_time_only: true

scoring:
  # These are matched against job TITLES (case-insensitive substring match)
  # Each hit adds +3 points to the job's score
  title_signals:
    - program manager
    - senior program manager
    - global program manager
    - director of program
    - director of infrastructure
    - director of technology
    - director of it
    - head of programs
    - head of technology
    - head of infrastructure
    - head of it
    - vp of program
    - vp of infrastructure
    - vp of technology
    - vp of it
    - technical program manager
    - infrastructure manager
    - it program manager
    - enterprise program
    - delivery manager
    - portfolio manager
    - it director
    - technology director
    - program director

  # Jobs whose titles contain ANY of these strings are penalized -20 points
  # This prevents pure engineering / analyst roles from ever ranking in your top 5
  title_blocklist:
    - devops engineer
    - data analyst
    - data engineer
    - data scientist
    - software engineer
    - software developer
    - frontend engineer
    - backend engineer
    - full stack
    - fullstack
    - machine learning engineer
    - ml engineer
    - security engineer
    - network engineer
    - cloud engineer
    - site reliability engineer
    - sre engineer
    - qa engineer
    - quality assurance engineer
    - product analyst
    - business analyst
    - systems engineer
    - platform engineer
    - microservices engineer
    - solutions engineer

sources:
  remotive: true
  weworkremotely: true
  remoteok: true

output:
  top_n: 5
  max_job_text_chars: 20000
