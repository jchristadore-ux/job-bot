# ─────────────────────────────────────────────────────────────────
# Job Bot Configuration — John Christadore
# Tuned to match: WHOOP, Confluent, Omada, Outreach, Affirm,
# Digimarc, FluidStack, Dropbox, BetMGM, Campbell's style roles
# ─────────────────────────────────────────────────────────────────

filters:
  # Minimum annual base salary (USD).
  # Roles with NO stated salary still pass — only filtered if salary is explicit AND below this.
  # Lowered from 165k: many strong-fit roles (WHOOP, Affirm) start at 150k base + equity
  min_salary: 150000

  # Must mention at least one comp signal (bonus/equity/RSU/stock/401k)
  require_bonus_or_equity: true

  # Only fully remote roles
  fully_remote_only: true

  # Only full-time employee roles (rejects contract/freelance/part-time)
  full_time_only: true

scoring:
  # Matched against job TITLES (case-insensitive substring)
  # Each hit adds +5 points
  title_signals:
    # Program Management
    - senior program manager
    - staff program manager
    - principal program manager
    - technical program manager
    - senior technical program manager
    - global program manager
    - enterprise program manager
    - program director
    - director of program
    - head of programs
    - vp of program
    # Product Management
    - senior product manager
    - staff product manager
    - principal product manager
    - group product manager
    - director of product
    - head of product
    - vp of product
    - product lead
    # Project Management
    - senior project manager
    - principal project manager
    - director of project
    - technical delivery manager
    - delivery manager
    - portfolio manager
    # Ops / Strategy (matches Omada, Dropbox roles)
    - director of operations
    - senior operations manager
    - head of operations
    - vp of operations
    - company operations lead
    - operations lead
    - senior operations lead
    - director of strategy
    - head of strategy
    - strategy and operations
    - chief of staff
    - business operations
    - director of technology
    - it director
    - technology director
    - infrastructure manager

  # Penalize -20 points for clearly wrong roles
  title_blocklist:
    - devops engineer
    - data analyst
    - data engineer
    - data scientist
    - software engineer
    - software developer
    - frontend engineer
    - backend engineer
    - full stack
    - fullstack
    - machine learning engineer
    - ml engineer
    - security engineer
    - network engineer
    - cloud engineer
    - site reliability engineer
    - sre engineer
    - qa engineer
    - quality assurance engineer
    - business analyst
    - systems engineer
    - platform engineer
    - solutions engineer
    - marketing manager
    - sales manager
    - account executive
    - account manager
    - recruiter
    - hr manager
    - financial analyst
    - research scientist

  # Description/company signals for preferred verticals
  # Each hit adds +3 points — stacks across multiple hits
  industry_signals:
    # AI / ML / Data
    - artificial intelligence
    - machine learning
    - large language model
    - LLM
    - generative AI
    - AI platform
    - MLOps
    - data platform
    - data streaming
    - real-time data
    - kafka
    - data infrastructure
    - applied AI
    - AI product
    - foundation model
    # Sports / Fitness / Wearables / Health Tech
    - sports technology
    - sports analytics
    - wearable
    - connected fitness
    - fitness platform
    - health tracking
    - human performance
    - athlete performance
    - biometric
    - digital health
    - healthtech
    - wellness platform
    - sports betting
    - fantasy sports
    # Named companies in target verticals
    - WHOOP
    - Strava
    - Garmin
    - Peloton
    - DraftKings
    - FanDuel
    - BetMGM
    - Affirm
    - Confluent
    - Outreach
    - Dropbox
    - Digimarc
    - FluidStack
    - Omada
    # SaaS / Enterprise Tech
    - SaaS
    - B2B software
    - developer tools
    - cloud platform
    - API platform
    - product-led growth
    - enterprise software
    - fintech
    - payments platform
    - digital transformation

sources:
  remotive: true
  weworkremotely: true
  remoteok: true

output:
  top_n: 5
  max_job_text_chars: 20000
